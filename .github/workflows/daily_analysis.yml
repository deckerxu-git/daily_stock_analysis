name: 每日股票分析

on:
  schedule:
    - cron: '0 10 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: true
        default: 'full'
        type: choice
        options: [full, market-only, stocks-only]
      force_run:
        description: '强制运行'
        required: false
        default: false
        type: boolean

concurrency:
  group: stock-analysis
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # 核心：授予写入权限，否则无法 git push
    permissions:
      contents: write
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 创建目录
        run: mkdir -p data logs reports
      
      - name: 执行股票分析
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SERVERCHAN_SCKEY: ${{ secrets.SERVERCHAN_SCKEY }}
          STOCK_LIST: ${{ vars.STOCK_LIST || secrets.STOCK_LIST || 'sh600519' }}
        run: |
          MODE="${{ github.event.inputs.mode || 'full' }}"
          FORCE_ARG=""
          if [ "${{ github.event.inputs.force_run }}" = "true" ]; then FORCE_ARG="--force-run"; fi
          
          if [ "$MODE" = "market-only" ]; then
            python main.py --market-review $FORCE_ARG
          elif [ "$MODE" = "stocks-only" ]; then
            python main.py --no-market-review $FORCE_ARG
          else
            python main.py $FORCE_ARG
          fi

      - name: 归档并提交报告
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 针对你截图中出现的文件名进行移动
          # 如果根目录有生成的 .md 文件，统统移动到 reports 文件夹
          find . -maxdepth 1 -name "*.md" -not -name "README.md" -exec mv {} reports/ \;
          
          git add -f reports/
          # 只有当 reports 文件夹有变化时才提交
          if ! git diff --cached --quiet; then
            git commit -m "自动更新分析报告: $(date +'%Y-%m-%d')"
            git push
          else
            echo "报告内容无变化，跳过提交"
          fi

      - name: 上传 Artifacts 备份
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: analysis-result
          path: |
            reports/
            logs/
